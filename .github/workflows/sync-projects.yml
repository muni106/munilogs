name: Sync Projects from GitHub

# on:
#   schedule:
#     - cron: "0 22 * * 0" # Sunday 10 PM UTC
#   workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch projects
        run: node scripts/fetch-projects.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git diff --quiet src/data/projects.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/projects.json
          git commit -m "chore: sync projects from github"
          git push
